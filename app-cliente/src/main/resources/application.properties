quarkus.http.port=8080

quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/banco
quarkus.datasource.username=postgres
quarkus.datasource.password=postgres

quarkus.flyway.migrate-at-start=true

//configuro el serviico
#app-prestamos/mp-rest/url=http://localhost:8090/
# Tu RestClient ahora usará la magia de Stork
quarkus.stork."app-prestamos".service-discovery.type=consul
quarkus.stork."app-prestamos".service-discovery.consul-host=servicio-consul
quarkus.stork."app-prestamos".service-discovery.consul-port=8500
app-prestamos/mp-rest/url=stork://app-prestamos