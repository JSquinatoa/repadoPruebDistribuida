name: app-todo
services:
  base-de-datos:
    image: postgres:17.10-alpine3.24
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: todo
    ports:
      - 5432:5432
  servicio-consul:
    image: consul:1.15.4
    command: |
      agent -dev
      -ui
      -bind 0.0.0.0
      -client 0.0.0.0
    ports:
      - 8500:8500
  proxy-traefik:
    image: traefik:3.7.5
    command:
      - "--api.insecure=true"
      - "--api.dashboard=true"
      - "--providers.consulcatalog=true"
      - "--providers.consulcatalog.endpoint.address=servicio-consul:8500"
      - "--providers.consulcatalog.exposedbydefault=false"
      - "--providers.consulcatalog.refreshinterval=5s"
    ports:
      - 8888:8080
      - 8080:80
  app-todo:
    deploy:
        replicas: 2
    image: johnquinatoa/app-todo:latest
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://base-de-datos:5432/todo
      QUARKUS_DATASOURCE_USERNAME: postgres
      QUARKUS_DATASOURCE_PASSWORD: postgres
      QUARKUS_HTTP_PORT: 8080
      CONSUL_HOST: servicio-consul
      CONSUL_PORT: 8500

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./config:/etc/prometheus
    ports:
      - 9090:9090