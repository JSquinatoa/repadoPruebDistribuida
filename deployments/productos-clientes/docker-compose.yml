version: '3.8'

services:
  postgres-db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tienda
    ports:
      - "5432:5432"

  app-productos:
    build:
      context: ../../app-productos
      dockerfile: ../../app-productos/src/main/docker/Dockerfile.jvm
    ports:
      - "8090:8090"
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres-db:5432/tienda

  app-clientes:
    build:
      context: ../../app-clientes
      dockerfile: ../../app-clientes/src/main/docker/Dockerfile.jvm
    ports:
      - "8070:8070"
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres-db:5432/tienda
      PRODUCTOS_API_MP_REST_URL: http://app-productos:8090
